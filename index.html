<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거상 이벤트 & 주막 알리미</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 450px; margin: auto; margin-bottom: 20px; }
        h1, h2 { color: #333; margin-top: 0; }
        .today { font-size: 1.1em; color: #666; margin-bottom: 15px; }
        .event-box { background: #ffeaa7; padding: 15px; border-radius: 10px; font-size: 1.2em; font-weight: bold; color: #d63031; margin-bottom: 25px; }
        
        /* 리스트 스타일 */
        .all-events { text-align: left; }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { padding: 12px 10px; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 8px; }
        li:hover { background-color: #f1f2f6; }
        .highlight { color: #d63031; font-weight: bold; background-color: #fff0f0; }
        .click-hint { font-size: 0.8em; color: #888; float: right; }

        /* 주막 임무 스타일 */
        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .input-group input, .input-group select, .input-group button { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.95em; }
        .input-group input { flex: 2; }
        .input-group select { flex: 1; }
        .input-group button { background: #0984e3; color: white; border: none; cursor: pointer; font-weight: bold; }
        .input-group button:hover { background: #74b9ff; }
        
        .mission-item { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; text-align: left; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #0984e3; }
        .mission-item.completed { border-left-color: #2ed573; background: #e8f9f0; animation: blink 1s infinite alternate; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        
        /* 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fff; margin: 20vh auto; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #aaa; }
        #modal-image { max-width: 100%; border-radius: 10px; margin: 15px 0; display: none; }
        #modal-detail { color: #555; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 0.95em; white-space: pre-line; }

        @keyframes blink { from { background: #e8f9f0; } to { background: #fff; } }
    </style>
</head>
<body>

<div class="container">
    <h1>거상 주간 알리미 ⏰</h1>
    <div class="today" id="today-text">일정을 불러오는 중...</div>
    <div class="event-box" id="event-text">이벤트를 불러오는 중...</div>
    <div class="all-events">
        <h2>📅 주간 일정 (클릭 시 상세 정보)</h2>
        <ul id="all-events-list"></ul>
    </div>
</div>

<div class="container">
    <h2>🍶 주막 임무 교역소</h2>
    <div class="input-group">
        <input type="text" id="mission-name" placeholder="임무 이름 (예: 동전 수집)">
        <select id="mission-time">
            <option value="10">10초 (테스트용)</option>
            <option value="3600">1시간</option>
            <option value="7200">2시간</option>
            <option value="14400">4시간</option>
            <option value="28800">8시간</option>
            <option value="43200">12시간</option>
        </select>
        <button onclick="addMission()">출발</button>
    </div>
    <ul id="mission-list"></ul>
</div>

<div id="eventModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modal-title">이벤트 제목</h3>
        <img id="modal-image" src="" alt="이벤트 이미지">
        <p id="modal-detail">상세 내용</p>
    </div>
</div>

<script>
    // 1. 요일별 이벤트 데이터
    const eventsData = {
        "일": { title: "경험치 300% / 주막 50% 할인", detail: "일요일 사냥 특화 날!\n- 전 서버 경험치 300%\n- 주막 용병 보관 비용 반값", image: "" },
        "월": { title: "신용도 2배 이벤트", detail: "주간 퀘스트 및 상단 임무 수행 시 신용도 보상 2배 제공", image: "" },
        "화": { title: "상단 연회 이벤트", detail: "연회 물품 소모 시 상단원 전체 버프 및 보상 상자 획득", image: "" },
        "수": { title: "무도장 / 혈투의전장 초기화", detail: "주간 도전 횟수가 초기화되니 점검 전 반드시 정산하세요.", image: "" },
        "목": { title: "거상 정기 점검", detail: "정기 패치 및 서버 안정화 작업 (보통 오전 진행)", image: "" },
        "금": { title: "금요일 깜짝 할인", detail: "캐시샵 일부 아이템 한정 세일 진행", image: "" },
        "토": { title: "경험치 250% / 드랍률 상승", detail: "주말 보너스 스프린트 단계 시작", image: "" }
    };

    const days = ["일", "월", "화", "수", "목", "금", "토"];
    const todayName = days[new Date().getDay()];

    document.getElementById("today-text").innerText = `오늘은 ${todayName}요일 입니다.`;
    document.getElementById("event-text").innerText = eventsData[todayName].title;

    const listElement = document.getElementById("all-events-list");
    days.forEach(day => {
        let li = document.createElement("li");
        li.innerHTML = `<strong>${day}요일:</strong> ${eventsData[day].title} <span class="click-hint">👆</span>`;
        if (day === todayName) li.classList.add("highlight");
        li.onclick = () => openModal(day);
        listElement.appendChild(li);
    });

    // 모달 제어
    const modal = document.getElementById("eventModal");
    function openModal(day) {
        const data = eventsData[day];
        document.getElementById("modal-title").innerText = `${day}요일 상세 정보`;
        document.getElementById("modal-detail").innerText = data.detail;
        const img = document.getElementById("modal-image");
        if (data.image) { img.src = data.image; img.style.display = "block"; } 
        else { img.style.display = "none"; }
        modal.style.display = "block";
    }
    function closeModal() { modal.style.display = "none"; }
    window.onclick = (e) => { if (e.target === modal) closeModal(); };

    // ==========================================
    // 2. 🌟 주막 임무 타이머 핵심 시스템 🌟
    // ==========================================
    let missions = JSON.parse(localStorage.getItem("gersang_missions")) || [];

    // 임무 추가 함수
    function addMission() {
        const nameInput = document.getElementById("mission-name");
        const timeSelect = document.getElementById("mission-time");
        
        if (!nameInput.value.trim()) {
            alert("임무 이름을 입력해주세요!");
            return;
        }

        const duration = parseInt(timeSelect.value); // 소요 시간 (초)
        const endTime = Date.now() + duration * 1000; // 종료 시각 계산 (밀리초)

        const newMission = {
            id: Date.now(),
            name: nameInput.value,
            endTime: endTime,
            notified: false
        };

        missions.push(newMission);
        saveAndRender();
        nameInput.value = "";
    }

    // 임무 삭제 함수
    function deleteMission(id) {
        missions = missions.filter(m => m.id !== id);
        saveAndRender();
    }

    // 데이터 저장 및 화면 갱신
    function saveAndRender() {
        localStorage.setItem("gersang_missions", JSON.stringify(missions));
        renderMissions();
    }

    // 실시간 타이머 UI 그리기
    function renderMissions() {
        const list = document.getElementById("mission-list");
        list.innerHTML = "";

        if (missions.length === 0) {
            list.innerHTML = "<li style='text-align:center; color:#999; border:none;'>진행 중인 주막 임무가 없습니다.</li>";
            return;
        }

        missions.forEach(mission => {
            const now = Date.now();
            const timeLeft = mission.endTime - now;

            let li = document.createElement("li");
            li.className = "mission-item";

            let contentStr = "";
            
            if (timeLeft <= 0) {
                // 임무 완료 상태
                li.className += " completed";
                contentStr = `<span><strong>[완료] ${mission.name}</strong> - 주막 복귀 완료!</span>`;
                
                // 브라우저 기본 알림음 또는 가벼운 경고창 (최초 1회만)
                if (!mission.notified) {
                    mission.notified = true;
                    localStorage.setItem("gersang_missions", JSON.stringify(missions));
                    alert(`🔔 [${mission.name}] 임무가 완료되었습니다! 수령해주세요.`);
                }
            } else {
                // 시간 계산 (시:분:초)
                const totalSeconds = Math.floor(timeLeft / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                
                const timeString = `${hours > 0 ? hours + '시간 ' : ''}${minutes}분 ${seconds}초 남음`;
                contentStr = `<span><strong>${mission.name}</strong> (${timeString})</span>`;
            }

            li.innerHTML = contentStr + `<button class="delete-btn" onclick="deleteMission(${mission.id})">삭제</button>`;
            list.appendChild(li);
        });
    }

    // 1초마다 타이머 화면 갱신 수행
    setInterval(renderMissions, 1000);
    
    // 페이지 처음 열렸을 때 리스트 띄우기
    renderMissions();
</script>

</body>
</html>
